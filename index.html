<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Gambar</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #FDFBF7; /* Matches your wedding site bg */
            font-family: 'Montserrat', sans-serif;
            color: #2D2926;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            margin: 0;
            opacity: 0.8;
        }
        p {
            font-size: 0.9rem;
            letter-spacing: 1px;
            margin: 10px 0 30px 0;
            opacity: 0.6;
        }
        .btn {
            display: inline-block;
            padding: 12px 25px;
            border: 1px solid #2D2926;
            text-decoration: none;
            color: #2D2926;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background-color: #2D2926;
            color: #FFFFFF;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Opps!</h1>
        <p>Looks like you're lost.</p>
    </div>
</body>
</html>
